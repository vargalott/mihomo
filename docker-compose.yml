name: mihomo

services:
  # source: https://github.com/MetaCubeX/mihomo/tree/Meta
  mihomo:
    container_name: mihomo
    image: docker.io/metacubex/mihomo:latest
    restart: always
    pid: host
    network_mode: host
    cap_add:
      - ALL
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - type: bind
        source: ./data
        target: /root/.config/mihomo
      - type: bind
        source: ./config.yaml
        target: /root/.config/mihomo/config.yaml

  # source: https://github.com/MetaCubeX/metacubexd
  metacubexd:
    container_name: metacubexd
    image: ghcr.io/metacubex/metacubexd:latest
    restart: always
    ports:
      - 10000:80
    environment:
      - DEFAULT_BACKEND_URL=http://127.0.0.1:9999

