name: mihomo

services:
  mihomo:
    container_name: mihomo
    image: docker.io/metacubex/mihomo:latest
    restart: always
    pid: host
    network_mode: host
    cap_add:
      - ALL
    volumes:
      - /dev/net/tun:/dev/net/tun
      - type: bind
        source: ./config.yaml
        target: /root/.config/mihomo/config.yaml

  metacubexd:
    container_name: metacubexd
    image: ghcr.io/metacubex/metacubexd
    restart: always
    ports:
      - 8899:80
    environment:
      - DEFAULT_BACKEND_URL=http://127.0.0.1:8890
